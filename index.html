<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHNAJAK CODE </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@300;400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        :root { 
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
            --danger-gradient: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', 'Hanuman', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
        }
        
        .navbar { 
            background: rgba(255,255,255,0.95) !important; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        
        .navbar-brand { 
            font-weight: 700; 
            background: var(--primary-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 1.8rem; 
        }
        
        .nav-link { color: #555 !important; font-weight: 500; cursor: pointer; }
        
        .cart-badge { 
            background: var(--danger-gradient); 
            color: white; 
            border-radius: 50%; 
            padding: 2px 8px; 
            font-size: 0.75rem; 
            margin-left: 5px; 
        }
        
        .main-container { padding: 40px 20px; min-height: calc(100vh - 200px); }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .page-title { text-align: center; color: white; margin-bottom: 50px; }
        .page-title h1 { font-size: 3rem; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .product-card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            transition: all 0.3s; 
        }
        
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .product-image { 
            height: 250px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-info { padding: 25px; }
        .product-title { font-size: 1.4rem; font-weight: 700; color: #333; }
        .product-description { color: #666; margin-bottom: 15px; }
        .product-price { font-size: 1.8rem; font-weight: 700; color: #e74c3c; }
        
        .btn-add-to-cart { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            background: var(--primary-gradient); 
            color: white; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        
        .btn-add-to-cart:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(118,75,162,0.4); 
        }
        
        .btn-add-to-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .alert-container { position: fixed; top: 100px; right: 20px; z-index: 9999; max-width: 400px; }
        
        .alert-custom { 
            border: none; 
            border-radius: 12px; 
            padding: 15px 20px; 
            margin-bottom: 10px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); 
            animation: slideInRight 0.4s ease; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        .alert-success-custom { background: var(--success-gradient); color: white; }
        .alert-error-custom { background: var(--danger-gradient); color: white; }
        
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        
        .modal-content { border-radius: 25px; border: none; }
        .modal-header { background: var(--primary-gradient); color: white; border-radius: 25px 25px 0 0; border: none; }
        .form-control { border-radius: 12px; border: 2px solid #e0e0e0; padding: 12px 18px; }
        .btn-auth { background: var(--primary-gradient); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 600; width: 100%; }
        
        .footer { background: rgba(0,0,0,0.8); color: white; padding: 40px 20px; text-align: center; }
        
        .cart-item { display: flex; gap: 15px; padding: 15px; background: #f8f9fa; border-radius: 12px; margin-bottom: 15px; }
        
        .btn-checkout { background: var(--success-gradient); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 700; width: 100%; }
        
        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 50px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="alert-container" id="alertContainer"></div>
    
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="#"><i class=""></i> AHNAJAK CODE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#cartModal">
                            <i class="bi bi-cart3"></i> Cart <span class="cart-badge" id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="authSection">
                        <button class="btn btn-outline-primary ms-2" onclick="showAuthModal('login')">Login</button>
                    </li>
                    <li class="nav-item d-none" id="userSection">
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i> <span id="userName">User</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="container">
            <div class="page-title">
                <h1>Welcome to AHNAJAK CODE</h1>
                <p>Discover amazing products!</p>
            </div>
            <div class="products-grid" id="productsGrid">
                <div class="loading-spinner">
                    <div class="spinner-border text-light" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer"><p>&copy; 2026 AHNAJAK </p></footer>

    <!-- Auth Modal -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="authModalTitle">Login</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="loginForm" onsubmit="login(event)">
                    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
                    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
                    <button type="submit" class="btn-auth">Login</button>
                    <p class="text-center mt-3">No account? <a href="#" onclick="toggleAuthMode()">Register</a></p>
                </form>
                <form id="registerForm" onsubmit="register(event)" style="display:none;">
                    <input type="text" id="regName" class="form-control mb-3" placeholder="Name" required>
                    <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email" required>
                    <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password" required>
                    <button type="submit" class="btn-auth">Register</button>
                    <p class="text-center mt-3">Have account? <a href="#" onclick="toggleAuthMode()">Login</a></p>
                </form>
            </div>
        </div></div>
    </div>

    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Shopping Cart</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div id="cartItems"><p class="text-center text-muted">Empty cart</p></div>
                <div class="mt-3 text-end fw-bold fs-5" id="cartTotal">Total: $0.00</div>
            </div>
            <div class="modal-footer">
                <button class="btn-checkout" onclick="showCheckoutModal()">Proceed to Checkout</button>
            </div>
        </div></div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Checkout</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="checkoutForm" onsubmit="placeOrder(event)">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name *</label>
                        <input type="text" id="checkoutName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email *</label>
                        <input type="email" id="checkoutEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number *</label>
                        <input type="tel" id="checkoutPhone" class="form-control" required>
                    </div>
                    <div class="alert alert-info">
                        <strong>Order Total:</strong> $<span id="checkoutTotalAmount">0.00</span>
                    </div>
                    <button type="submit" class="btn-checkout">Confirm Order</button>
                </form>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ⚠️ សូមប្រាកដថា URL នេះត្រឹមត្រូវ
        const API_URL = 'https://payment.forestsmp.site/api';
        
        let cart = [];
        let currentUser = null;
        let authModal, cartModal, checkoutModal;

        document.addEventListener('DOMContentLoaded', function() {
            authModal = new bootstrap.Modal(document.getElementById('authModal'));
            cartModal = new bootstrap.Modal(document.getElementById('cartModal'));
            checkoutModal = new bootstrap.Modal(document.getElementById('checkoutModal'));
            
            loadProducts();
            checkAuth();
        });

        function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if(saved) { 
                try {
                    currentUser = JSON.parse(saved); 
                    updateAuthUI(); 
                } catch(e) { console.error("Invalid user data"); }
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            try {
                const res = await fetch(`${API_URL}/products`);
                if (!res.ok) throw new Error('Network response was not ok');
                
                const products = await res.json();
                
                if(products.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-white"><h3>No products available</h3></div>';
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <div class="product-image">
                            ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : '<i class="bi bi-box-seam" style="font-size:5rem;color:white;"></i>'}
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-description">${p.description || ''}</p>
                            <div class="product-price">$${p.price.toFixed(2)}</div>
                            <button class="btn-add-to-cart" onclick="addToCart(${p.id},'${p.name.replace(/'/g, "\\'")}',${p.price})">Add to Cart</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { 
                grid.innerHTML = '<div class="col-12 text-center text-white"><h3>Failed to load products. Please check your connection.</h3></div>';
                showAlert('Failed to connect to server', 'error'); 
            }
        }

        function addToCart(id, name, price) {
            if(!currentUser) { 
                showAlert('Please login first!', 'error'); 
                showAuthModal('login'); 
                return; 
            }
            
            const existing = cart.find(i => i.id === id);
            if(existing) existing.quantity++;
            else cart.push({id, name, price, quantity: 1});
            
            updateCartUI();
            showAlert('Added to cart!', 'success');
        }

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = `Total: $${total.toFixed(2)}`;
            document.getElementById('checkoutTotalAmount').textContent = total.toFixed(2);
            
            const cartItemsDiv = document.getElementById('cartItems');
            if(cart.length === 0) {
                cartItemsDiv.innerHTML = '<p class="text-center text-muted">Empty cart</p>';
            } else {
                cartItemsDiv.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <div class="flex-grow-1">
                            <strong>${i.name}</strong><br>
                            <small>$${i.price.toFixed(2)} x ${i.quantity}</small>
                        </div>
                        <div class="fw-bold">$${(i.price * i.quantity).toFixed(2)}</div>
                    </div>
                `).join('');
            }
        }

        function showCheckoutModal() {
            if(cart.length === 0) { 
                showAlert('Cart is empty!', 'error'); 
                return; 
            }
            
            // Pre-fill user info if available
            if(currentUser) {
                document.getElementById('checkoutName').value = currentUser.name || '';
                document.getElementById('checkoutEmail').value = currentUser.email || '';
            }
            
            cartModal.hide();
            checkoutModal.show();
        }

        async function placeOrder(e) {
            e.preventDefault();
            
            const orderData = {
                customer_name: document.getElementById('checkoutName').value,
                customer_email: document.getElementById('checkoutEmail').value,
                customer_phone: document.getElementById('checkoutPhone').value,
                items: cart.map(i => ({product_id: i.id, quantity: i.quantity}))
            };

            try {
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });
                
                const data = await res.json();
                
                if(res.ok && data.order_id) {
                    showAlert(`Order placed! ID: ${data.order_id}`, 'success');
                    cart = [];
                    updateCartUI();
                    checkoutModal.hide();
                    document.getElementById('checkoutForm').reset();
                } else {
                    showAlert(data.error || 'Failed to place order', 'error');
                }
            } catch(err) { 
                showAlert('Network error. Please check your connection.', 'error'); 
                console.error(err);
            }
        }

        function showAuthModal(mode) {
            document.getElementById('authModalTitle').innerText = mode === 'login' ? 'Login' : 'Register';
            document.getElementById('loginForm').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = mode === 'register' ? 'block' : 'none';
            authModal.show();
        }

        function toggleAuthMode() {
            const loginForm = document.getElementById('loginForm');
            const isLogin = loginForm.style.display !== 'none';
            loginForm.style.display = isLogin ? 'none' : 'block';
            document.getElementById('registerForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('authModalTitle').innerText = isLogin ? 'Register' : 'Login';
        }

        async function login(e) {
            e.preventDefault();
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value, 
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    currentUser = data.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateAuthUI();
                    showAlert('Login successful!', 'success');
                    authModal.hide();
                    document.getElementById('loginForm').reset();
                } else { 
                    showAlert(data.error || 'Login failed', 'error'); 
                }
            } catch(e) { 
                showAlert('Connection error', 'error'); 
            }
        }

        async function register(e) {
            e.preventDefault();
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('regName').value, 
                        email: document.getElementById('regEmail').value, 
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    currentUser = data.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateAuthUI();
                    showAlert('Registration successful!', 'success');
                    authModal.hide();
                    document.getElementById('registerForm').reset();
                } else { 
                    showAlert(data.error || 'Registration failed', 'error'); 
                }
            } catch(e) { 
                showAlert('Connection error', 'error'); 
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            cart = [];
            updateAuthUI();
            updateCartUI();
            showAlert('Logged out', 'success');
        }

        function updateAuthUI() {
            const authSection = document.getElementById('authSection');
            const userSection = document.getElementById('userSection');
            const userName = document.getElementById('userName');
            
            if(currentUser) {
                authSection.classList.add('d-none');
                userSection.classList.remove('d-none');
                userName.textContent = currentUser.name;
            } else {
                authSection.classList.remove('d-none');
                userSection.classList.add('d-none');
            }
        }

        function showAlert(msg, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert-custom alert-${type}-custom`;
            alert.innerHTML = `<i class="bi bi-${type === 'success' ? 'check' : 'x'}-circle-fill"></i><div>${msg}</div>`;
            container.appendChild(alert);
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 400);
            }, 3000);
        }
    </script>
</body>
</html>
