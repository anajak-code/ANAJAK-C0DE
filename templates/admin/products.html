{% extends "base.html" %}
{% block content %}
<h2>Manage Products</h2>
<div class="card mb-4">
  <div class="card-body">
    <h5>Add New Product</h5>
    <form method="POST" action="{{ url_for('admin_add_product') }}">
      <div class="row g-2">
        <input name="name" class="form-control col" placeholder="Name" required>
        <input name="price" type="number" step="0.01" class="form-control col" placeholder="Price" required>
        <input name="stock" type="number" class="form-control col" placeholder="Stock" required>
        <input name="image_url" class="form-control col" placeholder="Image URL">
        <button class="btn btn-success col-auto">Add</button>
      </div>
      <textarea name="description" class="form-control mt-2" placeholder="Description"></textarea>
    </form>
  </div>
</div>
<table class="table">
  <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
  <tbody>
  {% for p in products %}
  <tr>
    <td>{{ p.id }}</td><td>{{ p.name }}</td>
    <td>${{ "%.2f"|format(p.price) }}</td><td>{{ p.stock }}</td>
    <td>
      <a href="{{ url_for('admin_delete_product', id=p.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a>
    </td>
  </tr>
  {% endfor %}
  </tbody>
</table>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Back</a>
{% endblock %}
