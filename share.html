<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Profile - AHNAJAK CODE</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center; margin: 0;
        }
        .loader { font-size: 1.5rem; font-weight: bold; animation: pulse 1.5s infinite; padding: 20px; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .error { background: #fee; color: #c00; padding: 20px; border-radius: 10px; margin: 20px; }
        .success { background: #efe; color: #080; padding: 20px; border-radius: 10px; margin: 20px; }
    </style>
</head>
<body>
    <div class="loader" id="loading">
        <div>កំពុងស្វែងរកគណនី...</div>
        <small style="opacity: 0.8;">Please wait...</small>
    </div>
    <div id="content"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            const parts = path.split('/').filter(p => p);
            
            // ពិនិត្យថាតើជា /share/username/code ឬអត់
            if (parts[0] === 'share' && parts.length >= 3) {
                const username = parts[1];
                const code = parts[2];
                
                console.log('Share URL detected:', { username, code });
                
                // ពិនិត្យមើលក្នុង LocalStorage
                const users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
                const targetUser = users.find(u => {
                    const userNameSlug = (u.name || '').toLowerCase().replace(/\s+/g, '-');
                    const userEmailSlug = (u.email || '').split('@')[0].toLowerCase();
                    return userNameSlug === username.toLowerCase() || userEmailSlug === username.toLowerCase();
                });
                
                setTimeout(() => {
                    if (targetUser) {
                        // រកឃើញ User
                        localStorage.setItem('viewing_profile', JSON.stringify({
                            ...targetUser,
                            shareCode: code,
                            sharedAt: new Date().toISOString()
                        }));
                        
                        // បញ្ជូនទៅ profile.html
                        window.location.href = `/profile.html?user=${username}&code=${code}`;
                    } else {
                        // រកមិនឃើញ
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('content').innerHTML = `
                            <div class="error">
                                <h2>😕 រកមិនឃើញគណនី</h2>
                                <p>User "<strong>${username}</strong>" មិនមានក្នុងប្ព័ន្ធ  Link នេះអត់សុពលភាព។</p>
                                <p style="font-size: 0.9rem; opacity: 0.8;">Code: ${code}</p>
                                <a href="/index.html" style="color: white; background: #667eea; padding: 10px 20px; border-radius: 20px; text-decoration: none; display: inline-block; margin-top: 10px;">ត្រប់ទៅទំព័រដើម</a>
                            </div>
                        `;
                    }
                }, 1000);
            } else {
                // មិនមែន Share URL
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
