<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Profile</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: move 20s linear infinite;
        }
        
        @keyframes move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .loader-container {
            text-align: center;
            z-index: 1;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-text {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .loader-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .error-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .error-box h2 {
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        
        .error-box p {
            color: #555;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .error-box .code {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #667eea;
            margin: 15px 0;
            display: inline-block;
        }
        
        .btn-home {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }
        
        @media (max-width: 768px) {
            .loader-container { padding: 30px 20px; }
            .loader-text { font-size: 1.2rem; }
            .error-box { padding: 30px 20px; margin: 20px; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loader-container">
        <div class="spinner"></div>
        <div class="loader-text">កំពុងស្វែងរកគណនី...</div>
        <div class="loader-subtext">Loading profile, please wait...</div>
    </div>
    
    <div id="content"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            const parts = path.split('/').filter(p => p);
            
            console.log(' URL Path:', path);
            console.log(' Parts:', parts);
            
            if (parts[0] === 'share' && parts.length >= 3) {
                const username = decodeURIComponent(parts[1]);
                const code = parts[2];
                
                console.log(' Searching for user:', { username, code });
                
                const users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
                console.log(' Total users in storage:', users.length);
                
                const targetUser = users.find(u => {
                    const userNameSlug = (u.name || '').toLowerCase().replace(/\s+/g, '-');
                    const userEmailSlug = (u.email || '').split('@')[0].toLowerCase();
                    const matchName = userNameSlug === username.toLowerCase();
                    const matchEmail = userEmailSlug === username.toLowerCase();
                    
                    console.log(`✓ Checking: ${u.name}`, { matchName, matchEmail });
                    return matchName || matchEmail;
                });
                
                setTimeout(() => {
                    if (targetUser) {
                        console.log(' User found:', targetUser);
                        
                        localStorage.removeItem('viewing_profile');
                        localStorage.setItem('viewing_profile', JSON.stringify({
                            ...targetUser,
                            shareCode: code,
                            sharedAt: new Date().toISOString()
                        }));
                        
                        window.location.href = `/profile.html?user=${username}&code=${code}&t=${Date.now()}`;
                    } else {
                        console.log('❌ User NOT found');
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('content').innerHTML = `
                            <div class="error-box">
                                <div class="error-icon"></div>
                                <h2>រកមិនឃើញគណនី</h2>
                                <p>គណនី "<strong>${username}</strong>" មិនមានក្នុងប្រព័ន្ធ ឬ Link នេះអត់សុពលភាព។</p>
                                <div class="code">Code: ${code}</div>
                                <p style="font-size: 0.85rem; color: #999;">ចំនួនអ្នកប្រើប្រាស់សរុប: ${users.length}</p>
                                <a href="/index.html" class="btn-home">
                                    <i class="bi bi-house"></i> ត្រឡប់ទៅទំព័រដើម
                                </a>
                            </div>
                        `;
                    }
                }, 800);
            } else {
                console.log(' Not a share URL, redirecting...');
                window.location.href = '../..';
            }
        });
    </script>
</body>
</html>
