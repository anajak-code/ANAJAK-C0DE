<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Profile - AHNAJAK CODE</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .loader { font-size: 2rem; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="loader">
        <p> កំពុងស្វែងរកគណនី...</p>
        <small id="statusText">Please wait...</small>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ១. ចាប់យក URL បច្ចុប្បន្ន
            const path = window.location.pathname; // ឧ. /share/monthai/hb0jXiPS
            
            // ២. បំបែក URL ដើម្បីយក Username និង Code
            // លទ្ធល: ["", "share", "monthai", "hb0jXiPS"]
            const parts = path.split('/').filter(part => part !== '');
            
            if (parts.length >= 3 && parts[0] === 'share') {
                const username = parts[1];   // monthai
                const shareCode = parts[2];  // hb0jXiPS
                
                document.getElementById('statusText').innerText = `Found user: ${username}`;

                // ៣. ពិនិត្យមើលក្នុង LocalStorage (Database សាកល្បង)
                // ចំណាំ: នៅក្នុង System ពិត អ្នកត្រូវ Fetch ពី API/Backend
                checkUserAndRedirect(username, shareCode);
            } else {
                window.location.href = '/index.html'; // បើ URL ខុស ត្រឡប់ទៅ Home
            }
        });

        function checkUserAndRedirect(username, code) {
            // សាកល្បងរក User ក្នុង LocalStorage (សម្រាប់ Demo)
            const users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const targetUser = users.find(u => 
                u.name.toLowerCase().replace(/\s+/g, '-') === username.toLowerCase() || 
                u.email.split('@')[0].toLowerCase() === username.toLowerCase()
            );

            if (targetUser) {
                // ✅ រកឃើញ User! 
                // បង្កើត Session បណ្តោះអាសន្ន ឬ Redirect ទៅ Profile Page
                localStorage.setItem('viewing_profile', JSON.stringify(targetUser));
                
                // បញ្ជូនទៅកាន់ទំព័រ Profile (អ្នកត្រូវបង្កើត profile.html ផង)
                // ឬបញ្ជូនទៅ index.html ហើយបើក Modal Profile
                setTimeout(() => {
                    window.location.href = `/profile.html?user=${username}&code=${code}`;
                }, 1000);
            } else {
                // ❌ រកមិនឃើញ User (ឬ Code ខុស)
                document.querySelector('.loader').innerHTML = `
                    <h2>😕 រកមិនឃើញគណនី</h2>
                    <p>User "${username}" មិនមានក្នុងប្រព័ន្ធ ឬ Link នេះអត់សុពលភាព។</p>
                    <a href="/index.html" style="color:white; text-decoration:underline;">ត្រប់ទៅទំព័រដើម</a>
                `;
            }
        }
    </script>
</body>
</html>
