<!-- profile.html -->
<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>User Profile - AHNAJAK CODE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Poppins', sans-serif; padding-top: 50px; }
        .profile-card { max-width: 500px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 120px; position: relative; }
        .avatar { width: 100px; height: 100px; background: white; border-radius: 50%; border: 5px solid white; position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; color: #667eea; }
        .info { padding: 60px 30px 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="header-bg">
                <div class="avatar" id="pAvatar">U</div>
            </div>
            <div class="info">
                <h2 id="pName">Loading...</h2>
                <p class="text-muted" id="pEmail">...</p>
                <hr>
                <div class="d-grid gap-2">
                    <a href="/index.html" class="btn btn-primary rounded-pill">Visit Shop</a>
                    <button onclick="window.history.back()" class="btn btn-outline-secondary rounded-pill">Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ទទួលទិន្នន័យពី share.html
        const params = new URLSearchParams(window.location.search);
        const username = params.get('user');
        
        // រកទិន្នន័យ User (កនុងករណីនេះយកពី localStorage ដែល share.html បានដាក់ទុក)
        // អាច Fetch ពី API ដោយប្រើ username
        const viewingData = JSON.parse(localStorage.getItem('viewing_profile'));
        
        if (viewingData) {
            document.getElementById('pName').innerText = viewingData.name;
            document.getElementById('pEmail').innerText = viewingData.email;
            document.getElementById('pAvatar').innerText = viewingData.name.charAt(0).toUpperCase();
        } else {
            // បើមិនមាន data (Refresh ផ្ទាល់) ត្រូវ Fetch ពី API វិញ
            document.getElementById('pName').innerText = username || "Unknown User";
        }
    </script>
</body>
</html>
