<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@300;400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        :root { 
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body { 
            font-family: 'Poppins', 'Hanuman', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 30%, #B0E0E6 60%, #87CEEB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .auth-title { text-align: center; margin-bottom: 30px; color: #2c3e50; }
        .auth-title h2 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        
        .form-control { border-radius: 12px; padding: 12px 15px; border: 2px solid #e2e8f0; }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        
        .btn-auth {
            background: var(--primary-gradient); color: white; border: none;
            padding: 12px; border-radius: 50px; font-weight: 600; width: 100%;
            transition: all 0.3s; margin-top: 10px;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        
        .divider {
            display: flex; align-items: center; text-align: center; margin: 25px 0; color: #718096;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider span { padding: 0 15px; font-size: 0.9rem; }
        
        .auth-link { text-align: center; margin-top: 20px; }
        .auth-link a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
        
        .forgot-link {
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        
        .forgot-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .forgot-link a:hover {
            text-decoration: underline;
        }
        
        /* Modal Styles */
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            background: var(--primary-gradient);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
            padding: 25px 30px;
        }
        
        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .modal-footer {
            border: none;
            padding: 0 30px 30px;
        }
        
        .btn-reset {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .info-box {
            background: #e6fffa;
            border-left: 4px solid #11998e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #2d3748;
        }
        
        .info-box i {
            color: #11998e;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-title">
            <img src="https://i.ibb.co/S4vrvBq8/logo-website.png" alt="Logo" style="height: 60px; margin-bottom: 15px;">
            <h2>Welcome Back</h2>
            <p class="text-muted">Login to your AHNAJAK CODE account</p>
        </div>

        <!-- Google Sign-In Button -->
        <div id="g_id_onload"
             data-client_id="166296204052-ba45pf8lu1tsdfv5590oreeg3daae0s5.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="380">
        </div>

        <div class="divider">
            <span>OR LOGIN WITH EMAIL</span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold"><i class="bi bi-lock"></i> Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
            </div>
            
            <!-- Forgot Password Link -->
            <div class="forgot-link">
                <a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
                    <i class="bi bi-question-circle"></i> Forgot Password?
                </a>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <div class="auth-link">
            Don't have an account? <a href="../register">Register here</a>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-key"></i> Forgot Password
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="info-box">
                        <i class="bi bi-info-circle"></i>
                        Enter your email address and we'll help you recover your account.
                    </div>
                    
                    <form id="forgotPasswordForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-envelope"></i> Email Address
                            </label>
                            <input type="email" id="forgotEmail" class="form-control" 
                                   placeholder="Enter your registered email" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn-reset">
                                <i class="bi bi-send"></i> Send Recovery Link
                            </button>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <p class="text-muted text-center w-100 mb-0" style="font-size: 0.85rem;">
                        Remember your password? <a href="#" data-bs-dismiss="modal" style="color: var(--primary-color);">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div class="modal fade" id="resetPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                    <h5 class="modal-title">
                        <i class="bi bi-check-circle"></i> Reset Password
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="info-box" style="background: #f0f9ff; border-left-color: #0ea5e9;">
                        <i class="bi bi-shield-check" style="color: #0ea5e9;"></i>
                        Create a new password for your account.
                    </div>
                    
                    <form id="resetPasswordForm">
                        <input type="hidden" id="resetEmail">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-lock"></i> New Password
                            </label>
                            <input type="password" id="newPassword" class="form-control" 
                                   placeholder="Enter new password" required minlength="6">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-lock-fill"></i> Confirm Password
                            </label>
                            <input type="password" id="confirmPassword" class="form-control" 
                                   placeholder="Confirm new password" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn-reset" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                                <i class="bi bi-check2-circle"></i> Reset Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Handle Google Sign-In response
        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);

            const googleUser = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                isGoogleUser: true
            };

            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const existingUser = users.find(u => u.email === googleUser.email);
            
            if (!existingUser) {
                users.push(googleUser);
                localStorage.setItem('ahnajak_users', JSON.stringify(users));
            }

            localStorage.setItem('current_user', JSON.stringify(googleUser));
            
            showAlert(`Welcome, ${responsePayload.name}!`, 'success');
            setTimeout(() => {
                window.location.href = '../../index.html';
            }, 1500);
        }

        // Decode JWT
        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Regular email/password login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('current_user', JSON.stringify(user));
                showAlert('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = '../../index.html';
                }, 1500);
            } else {
                showAlert('Email or Password incorrect!', 'error');
            }
        });

        // Forgot Password - Step 1: Verify Email
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const user = users.find(u => u.email === email);

            if (user) {
                // Check if it's a Google user
                if (user.isGoogleUser) {
                    showAlert('This account uses Google Sign-In. Please login with Google.', 'error');
                    return;
                }

                // Store email for reset
                document.getElementById('resetEmail').value = email;
                
                // Close forgot modal and open reset modal
                const forgotModal = bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal'));
                forgotModal.hide();
                
                setTimeout(() => {
                    const resetModal = new bootstrap.Modal(document.getElementById('resetPasswordModal'));
                    resetModal.show();
                    showAlert('Email verified! Please create a new password.', 'success');
                }, 300);
            } else {
                showAlert('Email not found! Please check and try again.', 'error');
            }
        });

        // Reset Password - Step 2: Set New Password
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match!', 'error');
                return;
            }

            // Validate password length
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters!', 'error');
                return;
            }

            // Update password in localStorage
            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const userIndex = users.findIndex(u => u.email === email);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('ahnajak_users', JSON.stringify(users));
                
                // Close modal
                const resetModal = bootstrap.Modal.getInstance(document.getElementById('resetPasswordModal'));
                resetModal.hide();
                
                showAlert('Password reset successful! Please login with your new password.', 'success');
                
                // Reset forms
                document.getElementById('forgotPasswordForm').reset();
                document.getElementById('resetPasswordForm').reset();
                
                // Pre-fill login email
                document.getElementById('loginEmail').value = email;
            } else {
                showAlert('Error updating password. Please try again.', 'error');
            }
        });

        // Show alert function
        function showAlert(msg, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type === 'success' ? 'success' : 'danger'} alert-dismissible fade show`;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.minWidth = '300px';
            alertDiv.style.boxShadow = '0 10px 30px rgba(0,0,0,0.2)';
            alertDiv.style.borderRadius = '12px';
            alertDiv.innerHTML = `
                <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 4000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
