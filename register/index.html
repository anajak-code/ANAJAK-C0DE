<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    
    <!-- Favicon & Logo -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/S4vrvBq8/logo-website.png">
    
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@300;400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        :root { 
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body { 
            font-family: 'Poppins', 'Hanuman', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 30%, #B0E0E6 60%, #87CEEB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .auth-title {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        
        .auth-title h2 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-auth {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #718096;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .divider span {
            padding: 0 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .auth-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
        }
        
        .auth-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-link a:hover {
            text-decoration: underline;
        }

        .telegram-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-title">
            <img src="https://i.ibb.co/S4vrvBq8/logo-website.png" alt="AnajakCode Logo" style="height: 65px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
            <h2>Create Account</h2>
            <p class="text-muted mb-0">Join ANAJAK CODE today</p>
        </div>

        <!-- ✅ 1. Telegram Login Widget -->
        <div class="telegram-wrapper">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="Ahnajakcode_Bot" 
                    data-size="large" 
                    data-radius="50" 
                    data-onauth="onTelegramAuth" 
                    data-request-access="write">
            </script>
        </div>

        <!-- ✅ 2. Google Sign-Up Button -->
        <div id="g_id_onload"
             data-client_id="166296204052-ba45pf8lu1tsdfv5590oreeg3daae0s5.apps.googleusercontent.com"
             data-context="signup"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="100%">
        </div>

        <div class="divider">
            <span>OR REGISTER WITH EMAIL</span>
        </div>

        <!-- ✅ 3. Email/Password Registration Form -->
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted"><i class="bi bi-person"></i> Full Name</label>
                <input type="text" id="regName" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small text-muted"><i class="bi bi-lock"></i> Password</label>
                <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="bi bi-person-plus me-2"></i> Register
            </button>
        </form>

        <div class="auth-link">
            Already have an account? <a href="../login">Login here</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ✅ JavaScript Logic -->
    <script>
        // ==========================================
        // 1. TELEGRAM LOGIN HANDLER (Send to Backend)
        // ==========================================
        function onTelegramAuth(user) {
            console.log('Telegram Auth Success:', user);
            
            // ផ្ញើទិន្នន័យទៅ Backend Python/Node.js ដើម្បី Verify Hash និង Send Message
            // ចំណាំ: បើ Run ក្នុង Localhost ប្តូរ URL ទៅ 'http://127.0.0.1:5000/api/telegram-login'
            const backendUrl = '/api/telegram-login'; 
            
            fetch(backendUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(user)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Save session to localStorage
                    const tgUser = {
                        name: `${user.first_name} ${user.last_name || ''}`,
                        email: `telegram_${user.id}@anajakcode.site`,
                        picture: user.photo_url,
                        telegramId: user.id,
                        username: user.username,
                        isTelegramUser: true
                    };
                    
                    localStorage.setItem('current_user', JSON.stringify(tgUser));
                    showAlert(`✅ Welcome, ${user.first_name}! Login successful.`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = '../../'; // Redirect to Home
                    }, 1500);
                } else {
                    showAlert('❌ Login failed: ' + (data.message || 'Invalid verification'), 'danger');
                }
            })
            .catch(error => {
                console.error('Backend Connection Error:', error);
                // For demo purposes, if backend is not ready, we can still simulate success
                showAlert('⚠️ Backend not connected, but Telegram auth received!', 'warning');
            });
        }

        // ==========================================
        // 2. GOOGLE SIGN-UP HANDLER
        // ==========================================
        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);

            const googleUser = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                isGoogleUser: true
            };

            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const existingUser = users.find(u => u.email === googleUser.email);
            
            if (existingUser) {
                showAlert('⚠️ This email is already registered. Please login instead.', 'warning');
                setTimeout(() => window.location.href = '../login', 2000);
                return;
            }

            users.push(googleUser);
            localStorage.setItem('ahnajak_users', JSON.stringify(users));
            localStorage.setItem('current_user', JSON.stringify(googleUser));
            
            showAlert(`✅ Welcome to ANAJAK CODE, ${responsePayload.name}!`, 'success');
            setTimeout(() => window.location.href = '../../', 1500);
        }

        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // ==========================================
        // 3. EMAIL/PASSWORD REGISTRATION
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            let users = JSON.parse(localStorage.getItem('ahnajak_users')) || [];
            const userExists = users.find(u => u.email === email);

            if (userExists) {
                showAlert('⚠️ This email is already registered. Please login instead.', 'warning');
                return;
            }

            const newUser = { name, email, password, isEmailUser: true };
            users.push(newUser);
            localStorage.setItem('ahnajak_users', JSON.stringify(users));

            showAlert('✅ Registration successful! Redirecting to login...', 'success');
            setTimeout(() => window.location.href = '../login', 1500);
        });

        // ==========================================
        // UTILITY: SHOW ALERT
        // ==========================================
        function showAlert(msg, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type === 'success' ? 'success' : (type === 'warning' ? 'warning' : 'danger')} alert-dismissible fade show shadow`;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.minWidth = '320px';
            alertDiv.innerHTML = `${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            document.body.appendChild(alertDiv);
            setTimeout(() => {
                alertDiv.classList.remove('show');
                setTimeout(() => alertDiv.remove(), 150);
            }, 4000);
        }
    </script>
</body>
</html>
