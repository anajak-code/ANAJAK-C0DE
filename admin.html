<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - My Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@300;400;700&family=Poppins:wght@300;400;600&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body { font-family: 'Poppins', 'Hanuman', sans-serif; background: #f0f2f5; }
        
        /* Sidebar Styling */
        .sidebar {
            min-height: 100vh;
            background: var(--primary-gradient);
            color: white;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }
        .nav-link { color: rgba(255,255,255,0.8); border-radius: 10px; margin-bottom: 5px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); color: white; transform: translateX(5px); }
        
        /* Cards & Stats */
        .stat-card {
            border: none; border-radius: 20px; overflow: hidden; position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .stat-card.bg-primary { background: var(--primary-gradient); color: white; }
        .stat-card h3 { font-weight: 700; }
        
        /* Modern Form & Upload Area */
        .upload-area {
            border: 2px dashed #cbd5e0; border-radius: 15px; padding: 30px; text-align: center;
            cursor: pointer; transition: all 0.3s; background: #f8fafc; position: relative;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #764ba2; background: #f3f0ff; }
        .upload-area i { font-size: 2rem; color: #764ba2; margin-bottom: 10px; }
        .preview-img { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-gradient {
            background: var(--primary-gradient); color: white; border: none; border-radius: 50px;
            padding: 10px 30px; font-weight: 600; transition: all 0.3s;
        }
        .btn-gradient:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); color: white; }
        
        /* Table */
        .table-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .table thead th { background: #f8f9fa; border-bottom: 2px solid #e9ecef; color: #4a5568; font-weight: 600; }
        .product-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="loginSection" class="d-flex align-items-center justify-content-center vh-100" style="background: var(--primary-gradient);">
    <div class="card p-4 shadow-lg" style="width: 350px; border-radius: 20px;">
        <h3 class="text-center mb-4"><i class="bi bi-shield-lock-fill"></i> Admin</h3>
        <input type="password" id="adminPassword" class="form-control form-control-lg mb-3" placeholder="Enter Password">
        <button onclick="login()" class="btn btn-gradient w-100 py-2">Login</button>
    </div>
</div>

<!-- Dashboard Section -->
<div id="dashboardSection" class="container-fluid d-none">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-4 d-none d-md-block">
            <h4 class="mb-4 fw-bold"><i class="bi bi-grid-fill"></i> MY SHOP</h4>
            <nav class="nav flex-column">
                <a class="nav-link active" href="#" onclick="showSection('overview')"><i class="bi bi-speedometer2 me-2"></i> Overview</a>
                <a class="nav-link" href="#" onclick="showSection('products')"><i class="bi bi-box-seam me-2"></i> Products</a>
                <a class="nav-link" href="#" onclick="showSection('orders')"><i class="bi bi-cart-check me-2"></i> Orders</a>
                <a class="nav-link mt-5" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            
            <!-- Overview -->
            <div id="overviewSection">
                <h2 class="fw-bold mb-4">Dashboard Overview</h2>
                <div class="row g-4">
                    <div class="col-md-3"><div class="card stat-card bg-primary p-3"><h3 id="statProducts">0</h3><p>Total Products</p></div></div>
                    <div class="col-md-3"><div class="card stat-card bg-success p-3"><h3 id="statRevenue">$0</h3><p>Total Revenue</p></div></div>
                    <div class="col-md-3"><div class="card stat-card bg-warning p-3"><h3 id="statOrders">0</h3><p>Total Orders</p></div></div>
                    <div class="col-md-3"><div class="card stat-card bg-info p-3"><h3 id="statPending">0</h3><p>Pending</p></div></div>
                </div>
            </div>

            <!-- Products Management -->
            <div id="productsSection" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">Manage Products</h2>
                    <button class="btn btn-gradient" onclick="toggleAddForm()"><i class="bi bi-plus-lg"></i> Add Product</button>
                </div>

                <!-- Add Product Form (Hidden by default) -->
                <div id="addProductForm" class="card mb-4 shadow-sm d-none" style="border-radius: 20px;">
                    <div class="card-body p-4">
                        <h5 class="mb-3">New Product Details</h5>
                        <form onsubmit="addProduct(event)">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" id="prodName" class="form-control" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" id="prodPrice" class="form-control" step="0.01" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Stock</label>
                                    <input type="number" id="prodStock" class="form-control" value="0">
                                </div>
                                
                                <!-- Image Upload Area -->
                                <div class="col-12">
                                    <label class="form-label">Product Image</label>
                                    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                                        <i class="bi bi-cloud-arrow-up-fill"></i>
                                        <p class="mb-0 fw-bold">Click to upload or drag and drop</p>
                                        <small class="text-muted">PNG, JPG up to 5MB</small>
                                        <input type="file" id="fileInput" accept="image/*" class="d-none" onchange="handleFileSelect(this)">
                                        <img id="imagePreview" class="preview-img">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label">Description</label>
                                    <textarea id="prodDesc" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="mt-4 text-end">
                                <button type="button" class="btn btn-light me-2" onclick="toggleAddForm()">Cancel</button>
                                <button type="submit" class="btn btn-gradient" id="saveBtn">Save Product</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Products Table -->
                <div class="table-container">
                    <table class="table table-hover align-middle">
                        <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
                        <tbody id="productsTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- Orders Section (Same logic as before, just styling updated) -->
            <div id="ordersSection" class="d-none">
                <h2 class="fw-bold mb-4">Customer Orders</h2>
                <div class="table-container">
                    <table class="table table-hover align-middle">
                        <thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'https://payment.forestsmp.site/api';
let selectedImageBase64 = null;

// --- AUTH & NAVIGATION ---
function login() {
    if(document.getElementById('adminPassword').value === 'admin123') {
        document.getElementById('loginSection').classList.add('d-none');
        document.getElementById('dashboardSection').classList.remove('d-none');
        loadStats();
    } else alert('Wrong password!');
}

function showSection(id) {
    ['overview', 'products', 'orders'].forEach(s => document.getElementById(s+'Section').classList.add('d-none'));
    document.getElementById(id+'Section').classList.remove('d-none');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    event.target.closest('.nav-link').classList.add('active');
    
    if(id === 'products') loadProducts();
    if(id === 'orders') loadOrders();
    if(id === 'overview') loadStats();
}

// --- IMAGE UPLOAD LOGIC ---
function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;

    // Check size (max 5MB for Base64 safety)
    if (file.size > 5 * 1024 * 1024) {
        alert("Image is too large! Max 5MB.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        selectedImageBase64 = e.target.result;
        const preview = document.getElementById('imagePreview');
        preview.src = selectedImageBase64;
        preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

// Drag and Drop support
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        document.getElementById('fileInput').files = e.dataTransfer.files;
        handleFileSelect(document.getElementById('fileInput'));
    }
});

// --- PRODUCT MANAGEMENT ---
async function addProduct(e) {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';
    btn.disabled = true;

    let finalImageUrl = '';
    
    // 1. If image selected, upload it first
    if (selectedImageBase64) {
        try {
            const uploadRes = await fetch(`${API_URL}/admin/upload`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ image: selectedImageBase64 })
            });
            const uploadData = await uploadRes.json();
            if(uploadData.url) finalImageUrl = `https://payment.forestsmp.site${uploadData.url}`;
        } catch(err) { console.error("Upload failed", err); }
    }

    // 2. Save Product Data
    const product = {
        name: document.getElementById('prodName').value,
        price: parseFloat(document.getElementById('prodPrice').value),
        stock: parseInt(document.getElementById('prodStock').value),
        description: document.getElementById('prodDesc').value,
        image_url: finalImageUrl || ''
    };

    try {
        await fetch(`${API_URL}/admin/products`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(product)
        });
        alert('Product added successfully!');
        toggleAddForm();
        loadProducts();
        loadStats();
        // Reset form
        selectedImageBase64 = null;
        document.getElementById('imagePreview').style.display = 'none';
        e.target.reset();
    } catch(err) { alert('Error saving product'); }
    finally {
        btn.innerHTML = 'Save Product';
        btn.disabled = false;
    }
}

// ... (loadProducts, deleteProduct, loadOrders functions remain same as previous code but update UI classes) ...
async function loadProducts() {
    const res = await fetch(`${API_URL}/products`);
    const products = await res.json();
    const tbody = document.getElementById('productsTable');
    tbody.innerHTML = products.map(p => `
        <tr>
            <td><img src="${p.image_url || 'https://via.placeholder.com/50'}" class="product-thumb"></td>
            <td class="fw-bold">${p.name}</td>
            <td>$${p.price.toFixed(2)}</td>
            <td><span class="badge ${p.stock > 0 ? 'bg-success' : 'bg-danger'} rounded-pill">${p.stock}</span></td>
            <td><button class="btn btn-sm btn-outline-danger rounded-pill" onclick="deleteProduct(${p.id})"><i class="bi bi-trash"></i></button></td>
        </tr>
    `).join('');
}

function toggleAddForm() {
    const form = document.getElementById('addProductForm');
    form.classList.toggle('d-none');
    if(!form.classList.contains('d-none')) form.scrollIntoView({behavior: 'smooth'});
}

// Initial Load
function loadStats() { /* Same as before */ }
function loadOrders() { /* Same as before */ }
function deleteProduct(id) { /* Same as before */ }
</script>
</body>
</html>
